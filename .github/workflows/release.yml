name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify PRIDGE_VERSION matches tag
        run: |
          declared=$(grep -oP "PRIDGE_VERSION = '\K[^']+" app/bootstrap.php)
          if [ "$declared" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match PRIDGE_VERSION ($declared) in app/bootstrap.php"
            exit 1
          fi

      - name: Build release archive
        run: |
          git archive --format=zip \
            --prefix="pridge-server-${{ steps.version.outputs.version }}/" \
            -o "pridge-server-${{ steps.version.outputs.version }}.zip" \
            HEAD

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "pridge-server-${{ steps.version.outputs.version }}.zip" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
